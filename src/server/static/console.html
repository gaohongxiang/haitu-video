<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Haitu Video Console</title>
    <link rel="stylesheet" href="/static/console.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="rail">
        <div class="brand">
          <span class="mark">海</span>
          <div>
            <strong>Haitu</strong>
            <small>v0.1 MVP</small>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-item active" type="button"><span>◇</span> 仪表盘</button>
          <button class="nav-item" type="button"><span>▣</span> 商品库</button>
          <button class="nav-item" type="button"><span>▶</span> 视频任务</button>
          <button class="nav-item" type="button"><span>￥</span> 成本台账</button>
          <button class="nav-item" type="button"><span>⚙</span> API 管理</button>
        </nav>
        <div class="rail-foot">
          <span>当前模式</span>
          <strong>本地 MVP</strong>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>管理控制台</h1>
            <p>商品资料、生成预检、视频任务和费用记录。</p>
          </div>
          <div class="top-actions">
            <span class="top-pill">ZH</span>
            <span id="balance-pill" class="balance-pill">¥0.00</span>
            <span class="avatar">海</span>
            <button id="refresh" class="ghost" type="button">刷新</button>
          </div>
        </header>

        <section id="ledger" class="ledger-strip" aria-label="任务台账"></section>

        <section class="grid">
          <form id="make-form" class="panel control-panel">
            <div class="panel-head">
              <h2>新建视频任务</h2>
              <span id="mode-pill" class="pill">mock 免费</span>
            </div>

            <label>
              商品
              <select id="product"></select>
            </label>

            <div class="row">
              <label>
                Provider
                <select id="provider">
                  <option value="mock">mock</option>
                  <option value="volcengine-seedance">volcengine-seedance</option>
                </select>
              </label>
              <label>
                时长
                <input id="duration" type="number" min="4" max="15" value="8" />
              </label>
            </div>

            <div class="row">
              <label>
                模板
                <select id="template">
                  <option value="scene">scene</option>
                  <option value="pain-point">pain-point</option>
                  <option value="benefit">benefit</option>
                  <option value="ugc">ugc</option>
                  <option value="unboxing">unboxing</option>
                </select>
              </label>
              <label>
                CTA
                <input id="cta" value="今すぐチェック" />
              </label>
            </div>

            <label>
              复用已有 manifest
              <input id="reuse-manifest" placeholder="outputs/.../manifest.json" />
            </label>

            <label class="check">
              <input id="confirm-paid" type="checkbox" />
              <span>确认允许付费请求</span>
            </label>

            <div id="paid-safety" class="safety-note">
              <strong>付费安全</strong>
              <span>付费 Provider 运行前必须先生成预检，并手动勾选确认允许付费请求。</span>
            </div>

            <div class="form-actions">
              <button id="preflight" class="ghost" type="button">生成预检</button>
              <button class="primary" type="submit">运行流水线</button>
            </div>
            <pre id="status" class="status">等待操作</pre>
          </form>

          <section id="preflight-panel" class="panel preflight-panel" aria-live="polite">
            <div class="panel-head">
              <h2>生成预检</h2>
              <span id="preflight-state" class="pill">未生成</span>
            </div>
            <div id="preflight-cost" class="preflight-kpis">
              <div class="preflight-empty">先点“生成预检”，这里会显示预计 token 和人民币成本。</div>
            </div>
            <div id="preflight-assets" class="preflight-assets"></div>
            <div class="preflight-copy">
              <h3>脚本要点</h3>
              <div id="preflight-script" class="preflight-text muted-box">等待预检结果</div>
            </div>
            <div class="preflight-copy">
              <h3>Seedance Prompt</h3>
              <pre id="preflight-prompt" class="prompt-box">等待预检结果</pre>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>商品库</h2>
              <span id="product-count" class="pill">0</span>
            </div>
            <div id="products" class="list"></div>
            <div id="product-facts-preview" class="product-facts-preview"></div>
          </section>

          <form id="settings-form" class="panel settings-panel">
            <div class="panel-head">
              <h2>API 管理</h2>
              <span id="settings-state" class="pill">本地默认</span>
            </div>

            <div class="row">
              <label>
                默认 Provider
                <select id="settings-provider">
                  <option value="mock">mock</option>
                  <option value="volcengine-seedance">volcengine-seedance</option>
                </select>
              </label>
              <label>
                默认时长
                <input id="settings-duration" type="number" min="4" max="15" value="8" />
              </label>
            </div>

            <div class="row">
              <label>
                默认模板
                <select id="settings-template">
                  <option value="scene">scene</option>
                  <option value="pain-point">pain-point</option>
                  <option value="benefit">benefit</option>
                  <option value="ugc">ugc</option>
                  <option value="unboxing">unboxing</option>
                </select>
              </label>
              <label>
                默认 CTA
                <input id="settings-cta" value="今すぐチェック" />
              </label>
            </div>

            <label>
              禁词库
              <textarea id="settings-forbidden" rows="4"></textarea>
            </label>

            <label>
              夸大卖点规则
              <textarea id="settings-rules" rows="3"></textarea>
            </label>

            <div class="settings-actions">
              <button class="primary" type="submit">保存 API 设置</button>
              <button id="apply-settings" class="ghost" type="button">应用到任务</button>
            </div>
          </form>

          <section class="panel wide">
            <div class="panel-head">
              <h2>商品版本组</h2>
              <span id="product-group-count" class="pill">0</span>
            </div>
            <div id="product-groups" class="product-group-list"></div>
          </section>

          <section class="panel wide">
            <div class="panel-head">
              <h2>生成报告</h2>
              <span id="report-count" class="pill">0</span>
            </div>
            <div id="job-filters" class="filter-bar" aria-label="视频任务筛选">
              <label>
                商品
                <select id="filter-product">
                  <option value="all">全部商品</option>
                </select>
              </label>
              <label>
                Provider
                <select id="filter-provider">
                  <option value="all">全部 Provider</option>
                </select>
              </label>
              <label>
                状态
                <select id="filter-status">
                  <option value="all">全部状态</option>
                </select>
              </label>
              <label class="check filter-check">
                <input id="filter-final-only" type="checkbox" />
                <span>只看成片</span>
              </label>
            </div>
            <div id="reports" class="report-list"></div>
          </section>
        </section>
      </section>
    </main>
    <script type="module" src="/static/console.js"></script>
  </body>
</html>
